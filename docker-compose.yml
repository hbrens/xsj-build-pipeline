services:
  harmony-builder:
    build:
      context: .
      dockerfile: service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      JOBS_DIR: /data/jobs
      BUILD_SCRIPT: /app/scripts/build_harmony_zip.sh
      TOOLS_DIR: /opt/harmony/command-line-tools
      MAX_UPLOAD_MB: "500"
      MAX_CONCURRENT_BUILDS: "1"
      BUILD_TIMEOUT_SECONDS: "1200"
    volumes:
      - ./command-line-tools:/opt/harmony/command-line-tools:ro
      - ./jobs:/data/jobs
    restart: unless-stopped
